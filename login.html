<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Формула здоровья</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8ddd7 0%, #f5f0ed 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            font-family: 'Frank Ruhl Libre', 'Inter', sans-serif;
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px rgba(70, 33, 26, 0.15);
            text-align: center;
        }
        
        .login-logo {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .login-logo-img {
            height: 70px;
            width: auto;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-logo-img:hover {
            transform: scale(1.02);
        }
        
        .login-logo-text {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #64b61a 0%, #e8be52 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .tab-buttons {
            display: flex;
            border-bottom: 2px solid #e8ddd7;
            margin-bottom: 32px;
        }
        
        .tab-btn-login {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: 600;
            color: #693D3D;
            cursor: pointer;
            position: relative;
            font-family: inherit;
        }
        
        .tab-btn-login.active {
            color: #64b61a;
        }
        
        .tab-btn-login.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #64b61a;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #46211A;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e0d6d0;
            border-radius: 50px;
            font-size: 16px;
            font-family: inherit;
            background: #faf8f7;
            transition: 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #64b61a;
            box-shadow: 0 0 0 3px rgba(100, 182, 26, 0.1);
        }
        
        .forgot-link {
            display: inline-block;
            margin-top: 12px;
            color: #64b61a;
            text-decoration: none;
            font-size: 14px;
        }
        
        .btn-login-submit {
            width: 100%;
            padding: 14px;
            background: #64b61a;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            font-family: inherit;
            transition: 0.2s;
        }
        
        .btn-login-submit:hover {
            background: #4d8e14;
            transform: translateY(-1px);
        }
        
        .auth-footer {
            margin-top: 32px;
            font-size: 12px;
            color: #693D3D;
            border-top: 1px solid #e8ddd7;
            padding-top: 24px;
        }
        
        .error-message {
            background: #fee2e2;
            color: #A43820;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .form-panel {
            display: none;
        }
        
        .form-panel.active {
            display: block;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
            }
            .login-logo-img {
                height: 50px;
            }
            .login-logo-text {
                font-size: 18px;
            }
            .tab-btn-login {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <a href="javascript:void(0);" onclick="location.reload();">
                    <img src="logo.png" alt="Формула здоровья" class="login-logo-img">
                </a>
                <span class="login-logo-text">Формула здоровья</span>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn-login active" data-tab="login">Вход</button>
                <button class="tab-btn-login" data-tab="register">Регистрация</button>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div id="loginPanel" class="form-panel active">
                <form id="loginForm">
                    <div class="form-group">
                        <label>ID или E-mail *</label>
                        <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль *</label>
                        <input type="password" id="loginPassword" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn-login-submit">Войти</button>
                    <a href="#" id="forgotLink" class="forgot-link">Забыли пароль? Восстановить</a>
                </form>
            </div>
            
            <div id="registerPanel" class="form-panel">
                <form id="registerForm">
                    <div class="form-group">
                        <label>Имя и фамилия *</label>
                        <input type="text" id="regName" placeholder="Иван Иванов" required>
                    </div>
                    <div class="form-group">
                        <label>E-mail *</label>
                        <input type="email" id="regEmail" placeholder="example@mail.com" required>
                    </div>
                    <div class="form-group">
                        <label>Пароль (мин. 6 символов) *</label>
                        <input type="password" id="regPassword" placeholder="••••••" required>
                    </div>
                    <button type="submit" class="btn-login-submit">Зарегистрироваться</button>
                </form>
            </div>
            
            <div class="auth-footer">
                МОЯ СИЛА, МОЙ ХАРАКТЕР, МОЯ ПОБЕДА!
            </div>
        </div>
    </div>
    
    <script>
        let usersDatabase = [
            { name: "Иван Петров", email: "ivan@test.ru", password: "123456" },
            { name: "Мария Сидорова", email: "maria@test.ru", password: "123456" }
        ];
        
        const tabBtns = document.querySelectorAll('.tab-btn-login');
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');
        const errorDiv = document.getElementById('errorMessage');
        
        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
        
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (btn.dataset.tab === 'login') {
                    loginPanel.classList.add('active');
                    registerPanel.classList.remove('active');
                } else {
                    loginPanel.classList.remove('active');
                    registerPanel.classList.add('active');
                }
            });
        });
        
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const user = usersDatabase.find(u => u.email === email && u.password === password);
            if (user) {
                sessionStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
            } else {
                showError('Неверный email или пароль');
            }
        };
        
        document.getElementById('registerForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            if (password.length < 6) {
                showError('Пароль должен быть не менее 6 символов');
                return;
            }
            if (usersDatabase.find(u => u.email === email)) {
                showError('Пользователь с таким email уже существует');
                return;
            }
            const newUser = { name, email, password };
            usersDatabase.push(newUser);
            sessionStorage.setItem('currentUser', JSON.stringify(newUser));
            window.location.href = 'index.html';
        };
        
        document.getElementById('forgotLink').onclick = (e) => {
            e.preventDefault();
            alert('Для восстановления пароля обратитесь к администратору.\n\nДемо-логины:\nivan@test.ru / 123456\nmaria@test.ru / 123456');
        };
    </script>
</body>
</html>
